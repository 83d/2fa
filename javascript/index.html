<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="connect-src 'none'; object-src 'none'; base-uri 'none'">
  <link rel="icon" href="data:,">
  <title>本地 TOTP 验证码生成器</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, "Microsoft YaHei", system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, #1d4ed866, transparent 38%),
        radial-gradient(circle at bottom right, #0f766e55, transparent 35%),
        #0f172a;
    }

    main {
      width: min(100%, 620px);
      padding: 30px;
      border: 1px solid #334155;
      border-radius: 20px;
      background: #111827e8;
      box-shadow: 0 24px 70px #0007;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.55rem, 5vw, 2.1rem);
    }

    .subtitle {
      margin: 0 0 26px;
      color: #94a3b8;
      line-height: 1.7;
    }

    label {
      display: block;
      margin-bottom: 9px;
      font-weight: 700;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    input,
    button {
      min-height: 46px;
      border-radius: 10px;
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid #475569;
      padding: 0 14px;
      background: #0f172a;
      color: #f8fafc;
      letter-spacing: 0.04em;
      outline: none;
    }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px #2563eb44;
    }

    button {
      border: 0;
      padding: 0 17px;
      cursor: pointer;
      font-weight: 700;
      background: #334155;
      color: #f8fafc;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.15);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .primary {
      background: #2563eb;
    }

    .result {
      margin-top: 28px;
      padding: 24px;
      border: 1px solid #334155;
      border-radius: 15px;
      background: #0b1220;
      text-align: center;
    }

    .result-label {
      color: #94a3b8;
      font-size: 0.92rem;
    }

    #code {
      display: block;
      margin: 8px 0 16px;
      color: #67e8f9;
      font-size: clamp(2.6rem, 12vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0.13em;
      line-height: 1;
    }

    .timer-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 0.92rem;
    }

    .track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #1e293b;
    }

    #progress {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #22d3ee, #3b82f6);
      transition: width 0.2s linear;
    }

    #status {
      min-height: 1.5em;
      margin: 16px 0 0;
      color: #94a3b8;
      text-align: center;
    }

    #status.error {
      color: #fda4af;
    }

    #status.success {
      color: #86efac;
    }

    .privacy {
      margin: 22px 0 0;
      padding-top: 18px;
      border-top: 1px solid #334155;
      color: #94a3b8;
      font-size: 0.88rem;
      line-height: 1.65;
    }

    @media (max-width: 520px) {
      main {
        padding: 22px;
      }

      .input-row {
        grid-template-columns: 1fr;
      }

      .input-row button,
      .actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>本地 TOTP 验证码生成器</h1>
    <p class="subtitle">验证码仅在当前浏览器中计算；页面不会上传或保存密钥。</p>

    <form id="generator-form" autocomplete="off">
      <label for="secret">Base32 密钥</label>
      <div class="input-row">
        <input
          id="secret"
          type="password"
          placeholder="例如：JBSWY3DPEHPK3PXP"
          autocapitalize="characters"
          spellcheck="false"
          required
        >
        <button id="toggle-secret" type="button">显示密钥</button>
      </div>

      <div class="actions">
        <button class="primary" type="submit">开始生成</button>
        <button id="use-demo" type="button">使用公开测试密钥</button>
        <button id="clear" type="button">清除</button>
      </div>
    </form>

    <section class="result" aria-label="验证码结果">
      <span class="result-label">当前验证码</span>
      <output id="code" aria-live="polite">------</output>
      <div class="timer-row">
        <span>30 秒刷新周期</span>
        <span>剩余 <strong id="remaining">--</strong> 秒</span>
      </div>
      <div class="track" aria-hidden="true">
        <div id="progress"></div>
      </div>
      <div class="actions" style="justify-content: center">
        <button id="copy" type="button" disabled>复制验证码</button>
      </div>
    </section>

    <p id="status" role="status"></p>
    <p class="privacy">提示：系统时间必须准确。请勿在公共电脑上输入真实密钥，也不要把密钥放进网址、日志或聊天消息中。</p>
  </main>

  <script src="./vendor/otpauth.umd.min.js"></script>
  <script>
    (() => {
      "use strict";

      const form = document.querySelector("#generator-form");
      const secretInput = document.querySelector("#secret");
      const toggleButton = document.querySelector("#toggle-secret");
      const demoButton = document.querySelector("#use-demo");
      const clearButton = document.querySelector("#clear");
      const copyButton = document.querySelector("#copy");
      const codeOutput = document.querySelector("#code");
      const remainingOutput = document.querySelector("#remaining");
      const progress = document.querySelector("#progress");
      const status = document.querySelector("#status");

      let activeTotp = null;

      function setStatus(message, kind = "") {
        status.textContent = message;
        status.className = kind;
      }

      function normalizeSecret(value) {
        return value.replace(/[\s-]+/g, "").toUpperCase();
      }

      function createTotp() {
        if (typeof OTPAuth === "undefined") {
          throw new Error("本地 OTPAuth 库加载失败");
        }

        const normalized = normalizeSecret(secretInput.value);
        if (!normalized) {
          throw new Error("请输入 Base32 密钥");
        }
        if (!/^[A-Z2-7]+=*$/.test(normalized)) {
          throw new Error("密钥不是有效的 Base32 格式");
        }

        return new OTPAuth.TOTP({
          algorithm: "SHA1",
          digits: 6,
          period: 30,
          secret: OTPAuth.Secret.fromBase32(normalized)
        });
      }

      function updateDisplay() {
        if (!activeTotp) return;

        const rawCode = activeTotp.generate();
        const remainingMs = activeTotp.remaining();
        const remainingSeconds = Math.max(1, Math.ceil(remainingMs / 1000));

        codeOutput.textContent = rawCode.slice(0, 3) + " " + rawCode.slice(3);
        codeOutput.dataset.rawCode = rawCode;
        remainingOutput.textContent = remainingSeconds;
        progress.style.width = Math.min(100, (remainingMs / 30000) * 100) + "%";
        copyButton.disabled = false;
      }

      function start() {
        try {
          activeTotp = createTotp();
          updateDisplay();
          setStatus("已在浏览器本地生成验证码", "success");
        } catch (error) {
          activeTotp = null;
          codeOutput.textContent = "------";
          delete codeOutput.dataset.rawCode;
          remainingOutput.textContent = "--";
          progress.style.width = "0";
          copyButton.disabled = true;
          setStatus(error.message || "无法生成验证码", "error");
        }
      }

      async function copyCode() {
        const code = codeOutput.dataset.rawCode;
        if (!code) return;

        try {
          await navigator.clipboard.writeText(code);
        } catch {
          const helper = document.createElement("textarea");
          helper.value = code;
          helper.style.position = "fixed";
          helper.style.opacity = "0";
          document.body.appendChild(helper);
          helper.select();
          document.execCommand("copy");
          helper.remove();
        }

        setStatus("验证码已复制", "success");
      }

      function clearAll() {
        activeTotp = null;
        secretInput.value = "";
        secretInput.type = "password";
        toggleButton.textContent = "显示密钥";
        codeOutput.textContent = "------";
        delete codeOutput.dataset.rawCode;
        remainingOutput.textContent = "--";
        progress.style.width = "0";
        copyButton.disabled = true;
        setStatus("");
        secretInput.focus();
      }

      form.addEventListener("submit", event => {
        event.preventDefault();
        start();
      });

      toggleButton.addEventListener("click", () => {
        const willShow = secretInput.type === "password";
        secretInput.type = willShow ? "text" : "password";
        toggleButton.textContent = willShow ? "隐藏密钥" : "显示密钥";
      });

      demoButton.addEventListener("click", () => {
        secretInput.value = "JBSWY3DPEHPK3PXP";
        start();
      });

      clearButton.addEventListener("click", clearAll);
      copyButton.addEventListener("click", copyCode);
      window.setInterval(updateDisplay, 200);
    })();
  </script>
</body>
</html>
